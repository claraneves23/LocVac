spring.application.name=locvac
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiration.access=${JWT_EXPIRATION_ACCESS}
jwt.expiration.refresh=${JWT_EXPIRATION_REFRESH}
jwt.expiration.mfa=${JWT_EXPIRATION_MFA}

# ==============================
# MFA
# ==============================
mfa.issuer=LocVac

# ==============================
# Mail (Brevo SMTP)
# ==============================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${MAIL_FROM}
mail.from-name=LocVac

# ==============================
# Cadastro / verificacao de email
# ==============================
cadastro.codigo.expiracao-minutos=10
cadastro.codigo.max-tentativas=5
cadastro.reenvio.intervalo-segundos=60