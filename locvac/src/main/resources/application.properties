spring.application.name=locvac
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:false}

# ==============================
# Hikari (pool de conexões)
# ==============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiration.access=${JWT_EXPIRATION_ACCESS}
jwt.expiration.refresh=${JWT_EXPIRATION_REFRESH}
jwt.expiration.mfa=${JWT_EXPIRATION_MFA} 

# ==============================
# MFA
# ==============================
mfa.issuer=LocVac

# ==============================
# Mail (Brevo HTTP API)
# ==============================
brevo.api-key=${BREVO_API_KEY}
mail.from=${MAIL_FROM}
mail.from-name=LocVac

# ==============================
# Cadastro / verificacao de email
# ==============================
cadastro.codigo.expiracao-minutos=10
cadastro.codigo.max-tentativas=5
cadastro.reenvio.intervalo-segundos=60